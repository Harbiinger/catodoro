{% extends 'base.html' %}

{% block content %}
<div class="grid gap-6 lg:grid-cols-[minmax(0,20rem)_1fr]">

  <!-- left column: the cat + timer -->
  <div class="space-y-6">
    {% include 'core/partials/cat_panel.html' %}

    <!-- Pomodoro timer (lives outside the htmx swap region so it survives) -->
    <section class="rounded-3xl bg-white/70 p-5 shadow-lg ring-1 ring-pink-200">
      <h3 class="mb-3 text-sm font-bold uppercase tracking-wide text-stone-500">Focus Timer</h3>
      <p id="focus-label" class="mb-1 truncate text-sm text-stone-600">No task selected</p>
      <div id="timer-clock" class="text-center text-6xl font-bold tabular-nums text-stone-800">25:00</div>
      <div class="mt-4 flex gap-2">
        <button id="timer-start"
          class="flex-1 rounded-xl bg-pink-500 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-pink-600">
          Start
        </button>
        <button id="timer-reset"
          class="rounded-xl bg-stone-200 px-4 py-2 text-sm font-semibold text-stone-600 transition hover:bg-stone-300">
          Reset
        </button>
      </div>
      <div class="mt-3 flex justify-center gap-1 text-xs">
        <button data-mins="25" class="mode-btn rounded-full bg-pink-100 px-3 py-1 font-semibold text-pink-800">Focus 25</button>
        <button data-mins="5"  class="mode-btn rounded-full px-3 py-1 font-semibold text-stone-500 hover:bg-stone-100">Break 5</button>
        <button data-mins="15" class="mode-btn rounded-full px-3 py-1 font-semibold text-stone-500 hover:bg-stone-100">Long 15</button>
      </div>
      <button id="roulette-btn" type="button"
        class="mt-3 flex w-full items-center justify-center gap-2 rounded-xl bg-pink-100 py-2 text-sm font-semibold text-pink-700 shadow-sm transition hover:bg-pink-200 disabled:cursor-not-allowed disabled:opacity-60">
        <span id="roulette-die" class="text-base">🎲</span> Random quest
      </button>
      <p class="mt-3 text-center text-xs text-stone-400">
        Finish a focus session to earn <b>{{ coins_per_pomodoro }}</b> 🪙
      </p>
    </section>
  </div>

  <!-- right column: tasks (swappable) -->
  <div id="task-section">
    {% include 'core/partials/task_section.html' %}
  </div>
</div>

<form id="pomodoro-form" hx-post="" hx-target="#task-section" hx-swap="innerHTML" class="hidden"></form>

<script>
(function () {
  var FOCUS_URL_TMPL = "{% url 'complete_pomodoro' 0 %}";  // .../tasks/0/pomodoro/
  var totalSecs = 25 * 60, remaining = totalSecs, running = false, ticker = null;
  var focusTaskId = null, isFocusMode = true;

  var clock = document.getElementById('timer-clock');
  var startBtn = document.getElementById('timer-start');
  var resetBtn = document.getElementById('timer-reset');
  var label = document.getElementById('focus-label');

  function fmt(s) {
    var m = Math.floor(s / 60), sec = s % 60;
    return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
  }
  function render() { clock.textContent = fmt(remaining); }

  function stop() {
    running = false; clearInterval(ticker); ticker = null;
    startBtn.textContent = 'Start';
    startBtn.classList.remove('bg-rose-500', 'hover:bg-rose-600');
    startBtn.classList.add('bg-pink-500', 'hover:bg-pink-600');
  }

  function finish() {
    stop();
    remaining = totalSecs; render();
    try { new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQ==').play(); } catch (e) {}
    if (isFocusMode && focusTaskId) {
      // credit the focus session on the server
      htmx.ajax('POST', FOCUS_URL_TMPL.replace('/0/', '/' + focusTaskId + '/'),
                { target: '#task-section', swap: 'innerHTML' });
    }
  }

  function tick() {
    remaining--;
    if (remaining <= 0) { finish(); return; }
    render();
  }

  startBtn.addEventListener('click', function () {
    if (running) { stop(); return; }
    running = true;
    startBtn.textContent = 'Pause';
    startBtn.classList.remove('bg-pink-500', 'hover:bg-pink-600');
    startBtn.classList.add('bg-rose-500', 'hover:bg-rose-600');
    ticker = setInterval(tick, 1000);
  });

  resetBtn.addEventListener('click', function () { stop(); remaining = totalSecs; render(); });

  document.querySelectorAll('.mode-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      stop();
      isFocusMode = btn.dataset.mins === '25';
      totalSecs = remaining = parseInt(btn.dataset.mins, 10) * 60;
      render();
      document.querySelectorAll('.mode-btn').forEach(function (b) {
        b.classList.remove('bg-pink-100', 'text-pink-800');
        b.classList.add('text-stone-500');
      });
      btn.classList.add('bg-pink-100', 'text-pink-800');
      btn.classList.remove('text-stone-500');
    });
  });

  // called from the task list (survives htmx swaps because it's on window)
  window.setFocusTask = function (id, title) {
    focusTaskId = id;
    label.textContent = '🎯 ' + title;
    // jump to focus mode if not already
    if (!isFocusMode) { document.querySelector('.mode-btn[data-mins="25"]').click(); }
  };

  // --- roulette: pick and focus a random active quest ---------------------
  var rouletteBtn = document.getElementById('roulette-btn');
  var die = document.getElementById('roulette-die');
  var spinning = false;

  function clearHighlights() {
    document.querySelectorAll('#task-section .js-task-row').forEach(function (r) {
      r.classList.remove('roulette-tick', 'roulette-win');
    });
  }

  if (rouletteBtn) rouletteBtn.addEventListener('click', function () {
    if (spinning) return;
    // read the *current* rows straight from the DOM so it stays fresh across swaps
    var rows = Array.prototype.slice.call(document.querySelectorAll('#task-section .js-task-row'));
    if (!rows.length) { label.textContent = '🎲 No active quests to spin!'; return; }

    spinning = true;
    rouletteBtn.disabled = true;
    clearHighlights();

    var N = rows.length;
    var finalIndex = Math.floor(Math.random() * N);
    var loops = 2 + Math.floor(Math.random() * 2);        // 2–3 full loops
    var seq = [];
    for (var k = 0; k < loops * N + finalIndex + 1; k++) seq.push(k % N);

    var i = 0;
    function step() {
      clearHighlights();
      var row = rows[seq[i]];
      var last = (i === seq.length - 1);
      row.classList.add(last ? 'roulette-win' : 'roulette-tick');
      row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      label.textContent = '🎲 ' + row.dataset.taskTitle;
      die.style.transform = 'rotate(' + (i * 90) + 'deg)';

      if (last) {
        window.setFocusTask(parseInt(row.dataset.taskId, 10), row.dataset.taskTitle);
        setTimeout(function () { row.classList.remove('roulette-win'); }, 1400);
        die.style.transform = '';
        spinning = false;
        rouletteBtn.disabled = false;
        return;
      }
      i++;
      var progress = i / seq.length;
      setTimeout(step, 55 + progress * progress * 300);   // ease-out: speeds slow down
    }
    step();
  });

  render();
})();
</script>
{% endblock %}

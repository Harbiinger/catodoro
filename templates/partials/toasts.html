{% for message in messages %}
  <div class="toast pointer-events-auto rounded-xl px-4 py-3 text-sm font-medium shadow-lg ring-1
    {% if message.tags == 'error' %}bg-rose-50 text-rose-800 ring-rose-200
    {% else %}bg-white text-stone-800 ring-pink-200{% endif %}">
    {{ message }}
  </div>
{% endfor %}
